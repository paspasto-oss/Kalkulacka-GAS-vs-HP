<script>
    const KWH_PER_M3 = 10.65; // Priemerná hodnota pre SR (spaľovacie teplo objemové)
    
    let currentActiveTab = 'tab-gas';

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.calc-content section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        currentActiveTab = tabId;
        updateAll();
    }

    function sync(sliderId, valId) {
        document.getElementById(valId).value = document.getElementById(sliderId).value;
        updateAll();
    }

    function updateAll() {
        if (currentActiveTab === 'tab-gas') calcGas();
        if (currentActiveTab === 'tab-loss') calcLoss();
        if (currentActiveTab === 'tab-fve') calcFVE();
        if (currentActiveTab === 'tab-noise') calcNoise();
    }

    function calcGas() {
        const m3 = parseFloat(document.getElementById('gas_m3_r').value);
        const pGas = parseFloat(document.getElementById('gas_price').value);
        const pElec = parseFloat(document.getElementById('elec_price').value);
        const eff = parseFloat(document.getElementById('gas_boiler_eff').value);

        // Určenie predpokladaného SCOP (ak je nízka spotreba = novostavba/podlahovka = vyšší SCOP)
        const estimatedSCOP = m3 < 1500 ? 4.0 : 3.4;

        const heatEnergyNeeded = m3 * KWH_PER_M3 * eff;
        const loss = heatEnergyNeeded / 2300; // 2300h je štandard pre odhad výkonu v SR
        
        const costGas = m3 * pGas;
        const costTC = (heatEnergyNeeded / estimatedSCOP) * pElec;
        const saving = costGas - costTC;

        document.getElementById('out_loss').innerText = loss.toFixed(1) + " kW";
        document.getElementById('out_gas_cost').innerText = Math.round(costGas).toLocaleString() + " €";
        document.getElementById('out_tc_cost').innerText = Math.round(costTC).toLocaleString() + " €";
        
        document.getElementById('summary_label').innerText = "Ročná úspora s TČ (odhad):";
        document.getElementById('summary_value').innerText = Math.round(saving).toLocaleString() + " €";
        
        document.getElementById('summary_box').style.background = saving > 0 ? "var(--brand-red)" : "#333";
    }

    function calcNoise() {
        const lw = parseFloat(document.getElementById('noise_lw').value);
        const r = parseFloat(document.getElementById('noise_dist_r').value);
        
        // Smerový činiteľ Q=2 (umiestnenie pri stene, čo je najbežnejšie)
        // Vzorec: Lp = Lw + 10*log10(Q / (4*PI*r^2))
        const lp = lw + 10 * Math.log10(2 / (4 * Math.PI * Math.pow(r, 2)));
        const result = Math.round(lp * 10) / 10;

        document.getElementById('res_extra').style.display = 'block';
        document.getElementById('extra_label').innerText = "Limit v SR (noc):";
        document.getElementById('extra_value').innerText = "40.0 dB(A)";
        document.getElementById('extra_info_icon').style.display = 'inline-block';
        
        document.getElementById('summary_label').innerText = "Hladina hluku u suseda:";
        document.getElementById('summary_value').innerText = result + " dB(A)";
        
        const summaryBox = document.getElementById('summary_box');
        // Farba podľa prekročenia limitu (Semafor)
        if (result > 40.5) {
            summaryBox.style.background = "#e74c3c"; // Červená - nevyhovuje
        } else if (result > 37) {
            summaryBox.style.background = "#f1c40f"; // Žltá - tesne
        } else {
            summaryBox.style.background = "#27ae60"; // Zelená - v poriadku
        }
    }

    // Ostatné funkcie (calcLoss, calcFVE) zostávajú zachované...
    window.onload = updateAll;
</script>
