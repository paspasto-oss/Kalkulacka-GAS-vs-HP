<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spektra Install - Pokročilá Kalkulačka (kWh)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-red: #e30613;
            --brand-dark: #b3050f;
            --bg-light: #f4f7f6;
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --white: #ffffff;
            --border-color: #dfe6e9;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0; padding: 0; line-height: 1.6;
        }

        .wrapper { max-width: 1300px; margin: 0 auto; padding: 50px 20px; }
        
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 {
            color: var(--brand-red); font-size: 2.2rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 1000px) {
            .calc-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .card-title {
            display: flex;
            align-items: center; gap: 15px;
            margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px;
        }
        .card-title i { color: var(--brand-red); font-size: 1.5rem; }
        .card-title h2 { font-size: 1.2rem; margin: 0; text-transform: uppercase; font-weight: 700; }

        .field { margin-bottom: 20px; }
        .field label {
            display: block; font-size: 0.85rem; font-weight: 600;
            text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
        }
        
        .slider-row { display: flex; align-items: center; gap: 15px; }
        .slider-row input[type="range"] { flex: 1; accent-color: var(--brand-red); }
        .val-box {
            width: 110px; background: #f1f3f5; border: 1px solid #ced4da;
            padding: 10px; border-radius: 6px; text-align: center;
            font-weight: 700; color: var(--brand-red);
        }

        input[type="number"], select {
            width: 100%; padding: 12px;
            border: 1px solid #ced4da; border-radius: 6px;
            font-family: 'Montserrat'; font-size: 1rem;
        }

        .outputs-section {
            position: sticky; top: 20px;
            background: var(--white);
            padding: 35px;
            border-radius: var(--radius);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
            border-top: 10px solid var(--brand-red);
        }

        .outputs-section h3 {
            text-transform: uppercase; font-weight: 800; color: var(--brand-red);
            text-align: center; margin-bottom: 30px;
        }

        .res-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; padding-bottom: 10px;
            border-bottom: 1px solid #f1f1f1;
        }
        .res-label { font-size: 0.9rem; color: var(--text-muted); }
        .res-value { font-size: 1.1rem; font-weight: 700; }
        .res-value.positive { color: #27ae60; }

        .summary-box {
            background: linear-gradient(135deg, var(--brand-red) 0%, var(--brand-dark) 100%);
            color: var(--white); padding: 25px; border-radius: 8px;
            text-align: center; margin-top: 30px;
        }
        .summary-box b { font-size: 2.2rem; font-weight: 800; }

        .btn-action {
            width: 100%; background: #333; color: white; border: none;
            padding: 15px; border-radius: 6px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <h1>Spektra Install - Kalkulačka Úspor</h1>
    </div>

    <div class="calc-grid">
        <div class="inputs-section">
            <div class="card">
                <div class="card-title"><i class="fas fa-burn"></i> <h2>Plyn</h2></div>
                <div class="field">
                    <label>Ročná spotreba (kWh/rok)</label>
                    <div class="slider-row">
                        <input type="range" id="gas_kwh_r" min="5000" max="50000" value="25000" step="100" oninput="sync('gas_kwh_r', 'gas_kwh_v')">
                        <input type="text" id="gas_kwh_v" class="val-box" value="25000" readonly>
                    </div>
                </div>
                <div class="field">
                    <label>Cena plynu (€/kWh s DPH)</label>
                    <input type="number" id="gas_price_kwh" value="0.055" step="0.001" oninput="updateAll()">
                </div>
                <div class="field">
                    <label>Účinnosť kotla</label>
                    <select id="gas_eff" onchange="updateAll()">
                        <option value="0.82">Starý atmosférický (82%)</option>
                        <option value="0.96" selected>Kondenzačný (96%)</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><i class="fas fa-bolt"></i> <h2>Tepelné Čerpadlo</h2></div>
                <div class="field">
                    <label>SCOP (Sezónna účinnosť)</label>
                    <select id="tc_scop" onchange="updateAll()">
                        <option value="4.2">Podlahovka (SCOP 4.2)</option>
                        <option value="3.5" selected>Radiátory (SCOP 3.5)</option>
                    </select>
                </div>
                <div class="field">
                    <label>Cena elektriny (€/kWh s DPH)</label>
                    <input type="number" id="elec_price" value="0.165" step="0.001" oninput="updateAll()">
                </div>
            </div>

            <div class="card">
                <div class="card-title"><i class="fas fa-wallet"></i> <h2>Investícia</h2></div>
                <div class="field"><label>Cena TČ po dotácii (€)</label><input type="number" id="inv_tc" value="6500" oninput="updateAll()"></div>
                <div class="field"><label>Cena nového kotla (€)</label><input type="number" id="inv_gas" value="3000" oninput="updateAll()"></div>
            </div>
        </div>

        <div class="outputs-section">
            <h3>Ročná Bilancia</h3>
            <div class="res-row"><span class="res-label">Náklady Plyn:</span><span class="res-value" id="res_gas">0 €</span></div>
            <div class="res-row"><span class="res-label">Náklady TČ:</span><span class="res-value" id="res_tc">0 €</span></div>
            <div class="res-row"><span class="res-label">Ročná úspora:</span><span class="res-value positive" id="res_save">0 €</span></div>
            
            <div class="summary-box">
                <span>Úspora za 10 rokov</span><br>
                <b id="res_10y">0 €</b>
            </div>
            
            <div class="res-row" style="margin-top:20px; border:none;">
                <span class="res-label">Návratnosť investície:</span>
                <span class="res-value" id="res_payback">0 rokov</span>
            </div>

            <button class="btn-action" onclick="window.print()">Stiahnuť PDF</button>
        </div>
    </div>
</div>

<script>
    function sync(sliderId, valId) {
        document.getElementById(valId).value = document.getElementById(sliderId).value;
        updateAll();
    }

    function updateAll() {
        const kwhInput = parseFloat(document.getElementById('gas_kwh_r').value);
        const pGas = parseFloat(document.getElementById('gas_price_kwh').value);
        const pElec = parseFloat(document.getElementById('elec_price').value);
        const effGas = parseFloat(document.getElementById('gas_eff').value);
        const scop = parseFloat(document.getElementById('tc_scop').value);
        
        const invTc = parseFloat(document.getElementById('inv_tc').value);
        const invGas = parseFloat(document.getElementById('inv_gas').value);

        // Potreba tepla pre dom (kWh tepla, ktoré dom reálne potrebuje)
        const heatNeeded = kwhInput * effGas;

        // Ročné náklady
        const costGas = kwhInput * pGas;
        const costTc = (heatNeeded / scop) * pElec;
        const saving = costGas - costTc;

        // Investícia
        const invDiff = invTc - invGas;
        const payback = invDiff / saving;
        const save10y = (saving * 10) - invDiff;

        document.getElementById('res_gas').innerText = Math.round(costGas).toLocaleString() + " €";
        document.getElementById('res_tc').innerText = Math.round(costTc).toLocaleString() + " €";
        document.getElementById('res_save').innerText = "+ " + Math.round(saving).toLocaleString() + " €";
        document.getElementById('res_10y').innerText = Math.round(save10y).toLocaleString() + " €";
        document.getElementById('res_payback').innerText = saving > 0 ? payback.toFixed(1) + " rokov" : "Nenávratné";
    }

    window.onload = updateAll;
</script>

</body>
</html>
